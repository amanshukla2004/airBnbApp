spring.application.name=airBnbApp
server.port=9091
# DataBase Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/airBnb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
# Driver Class (Explicitly adding this helps Spring Boot)
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# HikariCP - give Render's free DB time to wake up
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
